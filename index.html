<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Five Peaks Coffee | Premium Barista Coffee Catering UK</title>
    
    <!-- SEO handled by React Helmet -->

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Five Peaks Coffee",
        "image": "https://i.postimg.cc/CLf8SKL7/IMG_20240309_WA0017.jpg",
        "@id": "https://www.fivepeakscoffee.co.uk/",
        "url": "https://www.fivepeakscoffee.co.uk/",
        "telephone": "",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "",
          "addressLocality": "Edinburgh",
          "addressRegion": "Scotland",
          "postalCode": "",
          "addressCountry": "GB"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 55.9533,
          "longitude": -3.1883
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "00:00",
          "closes": "23:59"
        },
        "sameAs": [
          "https://www.facebook.com/fivepeakscoffee",
          "https://www.instagram.com/fivepeakscoffee"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
